version: '3.8'
services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: micro-users-tesis
    env_file:
      - .env
    ports:
      - '3000:3000'
    environment:
      JWT_SECRET: ${JWT_SECRET}
      HASH_SALT_ROUNDS: ${HASH_SALT_ROUNDS}
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_DATABASE: ${DB_DATABASE}
      MAIL_HOST: ${MAIL_HOST}
      MAIL_PORT: ${MAIL_PORT}
      MAIL_USER: ${MAIL_USER}
      MAIL_PASS: ${MAIL_PASS}
      MAIL_FROM: ${MAIL_FROM}
      FRONTEND_URL: ${FRONTEND_URL}
    depends_on:
      - mysql-api

  mysql-api:
    image: mysql:8.0
    container_name: mysql-api
    ports:
      - '3307:3306'
    environment:
      MYSQL_ROOT_PASSWORD: zxkesV803rAsWKDHTLTB
      MYSQL_DATABASE: users
      MYSQL_USER: micro
      MYSQL_PASSWORD: zxkesV803rAsWKDHTLTB
    volumes:
      - mysql-data:/var/lib/mysql

volumes:
  mysql-data: